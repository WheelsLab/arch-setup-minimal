add_newline = false
format = """
$directory$git_branch$git_status$character"""

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[✗](bold red)"
vimcmd_symbol = "[❮](bold green)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold blue"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold red"
conflicted = "⚔️ "
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "🤷"
stashed = "📦"
modified = "📝"
staged = '[++\($count\)](green)'
renamed = "👅"
deleted = "🗑"

[aws]
symbol = "☁️  "

[crystal]
symbol = "💎  "

[docker]
symbol = "🐳  "

[elixir]
symbol = "💧  "

[golang]
symbol = "🐹  "

[helm]
symbol = "⎈  "

[java]
symbol = "☕  "

[julia]
symbol = "⊹  "

[memory_usage]
symbol = "💻 "
threshold = 75

[nim]
symbol = "👑  "

[nodejs]
symbol = "⬢  "

[package]
symbol = "📦  "

[python]
symbol = "🐍  "

[ruby]
symbol = "💎  "

[rust]
symbol = "🦀  "

[scala]
symbol = "🦁  "

[swift]
symbol = "🐦  "
